name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub release and bump homebrew tap
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject version matches tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pyver=$(grep -E '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$pyver" != "$VERSION" ]; then
            echo "::error::pyproject.toml version ($pyver) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python3 - <<'PY' > /tmp/release-notes.md
          import os, re
          version = os.environ["VERSION"]
          text = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          if not m:
              raise SystemExit(f"No CHANGELOG section found for {version}")
          print(m.group(1).strip())
          PY
          echo "Release notes preview:"
          head -10 /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md

      - name: Compute tarball SHA256
        id: tarball
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          url="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          for i in 1 2 3 4 5; do
            if curl -fsSL "$url" -o /tmp/tarball.tar.gz; then
              break
            fi
            sleep 5
          done
          sha=$(shasum -a 256 /tmp/tarball.tar.gz | awk '{print $1}')
          echo "sha256=${sha}" >> "$GITHUB_OUTPUT"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Check out homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gabrimatic/homebrew-local-whisper
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Bump formula
        env:
          NEW_URL: ${{ steps.tarball.outputs.url }}
          NEW_SHA: ${{ steps.tarball.outputs.sha256 }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python3 - <<'PY'
          import os, pathlib, re
          new_url = os.environ["NEW_URL"]
          new_sha = os.environ["NEW_SHA"]
          path = pathlib.Path("tap/Formula/local-whisper.rb")
          text = path.read_text()
          text, n1 = re.subn(
              r'url "https://github\.com/gabrimatic/local-whisper/archive/refs/tags/v[^"]+"',
              f'url "{new_url}"',
              text, count=1,
          )
          text, n2 = re.subn(
              r'(url "https://github\.com/gabrimatic/local-whisper/archive/refs/tags/[^"]+"\n\s*sha256 ")[^"]+(")',
              rf'\g<1>{new_sha}\g<2>',
              text, count=1,
          )
          if n1 != 1 or n2 != 1:
              raise SystemExit(f"Unexpected substitution counts: url={n1}, sha={n2}")
          path.write_text(text)
          PY
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formula changes"
            exit 0
          fi
          git add Formula/local-whisper.rb
          git commit -m "local-whisper ${VERSION}"
          git push
